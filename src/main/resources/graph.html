<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0ede8; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; display: flex; height: 100vh; }

        #graph-panel { flex: 1; position: relative; overflow: hidden; }
        #ai-panel {
          width: 320px;
          background: white;
          border-left: 1px solid #e0e0e0;
          display: flex;
          flex-direction: column;
          padding: 20px;
          overflow-y: auto;
        }

        svg { width: 100%; height: 100%; }

        .link-props { stroke: #4a9eff; stroke-width: 1.5; fill: none; marker-end: url(#arrow-props); }
        .link-state { stroke: #c87c2a; stroke-width: 1.5; fill: none; stroke-dasharray: 7,5; marker-end: url(#arrow-state); }

        .node rect { fill: white; stroke: #4a9eff; stroke-width: 2; cursor: pointer; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08)); }
        .node rect:hover { filter: drop-shadow(0 4px 16px rgba(74,158,255,0.2)); }
        .node.selected rect { stroke: #1a6fd4; stroke-width: 3; }
        .node-name { fill: #1a1a1a; font-size: 16px; font-weight: 700; pointer-events: none; }
        .node-sub { fill: #888; font-size: 11px; pointer-events: none; }
        .node-usestate { fill: #c87c2a; font-size: 13px; font-weight: 600; pointer-events: none; }
        .edge-label { fill: #4a9eff; font-size: 11px; pointer-events: none; font-weight: 500; }
        .edge-label-state { fill: #c87c2a; font-size: 11px; pointer-events: none; font-weight: 500; }

        #legend { position: absolute; bottom: 16px; left: 16px; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px 16px; color: #555; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .legend-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .legend-line { width: 32px; height: 2px; }
        .legend-line.props { background: #4a9eff; }
        .legend-line.state { border-top: 2px dashed #c87c2a; height: 0; }

        #hint { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 13px; }
        #zoom-controls { position: absolute; top: 16px; left: 16px; display: flex; gap: 8px; z-index: 100; }
        #zoom-controls button { width: 32px; height: 32px; font-size: 18px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        #zoom-controls button:hover { background: #f0f0f0; }

        #toggle-btn {
          position: absolute;
          top: 16px;
          right: 0px;
          width: 28px;
          height: 28px;
          background: white;
          border: 1px solid #ddd;
          border-radius: 6px;
          cursor: pointer;
          font-size: 14px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.1);
          z-index: 100;
        }
        #toggle-btn:hover { background: #f0f0f0; }

        #ai-placeholder { color: #bbb; font-size: 13px; text-align: center; margin-top: 60px; line-height: 2; }
        #ai-content { display: none; }
        #ai-component-name { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
        #ai-component-tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px; margin-bottom: 16px; }
        #ai-component-tag.has-state { background: #fff3e0; color: #c87c2a; }
        #ai-component-tag.no-state { background: #e8f4ff; color: #4a9eff; }
        #ai-explanation { font-size: 13px; color: #333; line-height: 1.8; }
        #ai-explanation .section-title { color: #1a1a1a; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-top: 16px; margin-bottom: 6px; }
        #ai-explanation .section-body { color: #444; line-height: 1.7; }
        #ai-explanation .prop-item { margin: 3px 0; }
        #ai-explanation .prop-name { color: #4a9eff; font-weight: 600; }
        #ai-explanation .insight-box { background: #f8f8f8; border-left: 3px solid #4a9eff; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-top: 6px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
<div id="graph-panel">
    <div id="hint">Click any component to learn</div>
    <div id="zoom-controls">
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomOut()">−</button>
    </div>
    <button id="toggle-btn" onclick="togglePanel()" title="Toggle explanation panel">→</button>
    <svg id="svg">
        <defs>
            <marker id="arrow-props" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
            </marker>
            <marker id="arrow-state" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#c87c2a"/>
            </marker>
        </defs>
        <g id="root-g"></g>
    </svg>
    <div id="legend">
        <div class="legend-row"><div class="legend-line props"></div> Props flow</div>
        <div class="legend-row"><div class="legend-line state"></div> State update</div>
    </div>
</div>

<div id="ai-panel">
    <div id="ai-placeholder">👆 Click any component<br>to see an explanation</div>
    <div id="ai-content">
        <div id="ai-component-name"></div>
        <span id="ai-component-tag"></span>
        <div id="ai-explanation"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
    const NODE_W = 220, NODE_H = 80, H_GAP = 80, V_GAP = 130;
    let currentData = null;

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.3, 2])
      .filter(event => event.type === 'mousedown')
      .on('zoom', e => d3.select('#root-g').attr('transform', e.transform));

    function zoomIn() { d3.select('#svg').call(zoomBehavior.scaleBy, 1.3); }
    function zoomOut() { d3.select('#svg').call(zoomBehavior.scaleBy, 0.7); }

    function togglePanel() {
      const panel = document.getElementById('ai-panel');
      const btn = document.getElementById('toggle-btn');
      if (panel.style.display === 'none') {
        panel.style.display = 'flex';
        btn.textContent = '→';
        btn.style.right = '0px';
      } else {
        panel.style.display = 'none';
        btn.textContent = '←';
        btn.style.right = '4px';
      }
    }

    function findParent(name, data) {
      for (const [parentName, node] of Object.entries(data.components)) {
        if ((node.children || []).includes(name)) return parentName;
      }
      return null;
    }

    function findStateAncestor(childName, data) {
      for (const [parentName, node] of Object.entries(data.components)) {
        if (node.hasUseState && (node.children || []).includes(childName)) return parentName;
      }
      for (const [parentName, node] of Object.entries(data.components)) {
        if ((node.children || []).includes(childName)) {
          const ancestor = findStateAncestor(parentName, data);
          if (ancestor) return ancestor;
        }
      }
      return null;
    }

    function generateExplanation(name, node, data) {
      const parent = findParent(name, data);
      const stateAncestor = findStateAncestor(name, data);
      const props = node.props || [];
      const children = node.children || [];
      const setterProps = props.filter(p => p.startsWith('set') || p.startsWith('on'));
      const dataProps = props.filter(p => !p.startsWith('set') && !p.startsWith('on'));

      let html = '';

      html += `<span class="section-title">Role</span>`;
      if (node.hasUseState) {
        html += `<div class="section-body">${name} is the data source. It manages its own state with <strong>useState</strong>${parent ? ` and is rendered by <strong>${parent}</strong>` : ''}.</div>`;
      } else if (parent) {
        html += `<div class="section-body">${name} receives props from parent <strong>${parent}</strong>${children.length > 0 ? ' and renders child components' : ''}.</div>`;
      } else {
        html += `<div class="section-body">${name} is the root component of this application.</div>`;
      }

      html += `<span class="section-title">Props</span>`;
      if (props.length === 0) {
        html += `<div class="section-body">None — this component is self-contained.</div>`;
      } else {
        dataProps.forEach(p => {
          html += `<div class="prop-item"><span class="prop-name">${p}</span> — data passed down from <strong>${parent || 'parent'}</strong> for display.</div>`;
        });
        setterProps.forEach(p => {
          html += `<div class="prop-item"><span class="prop-name">${p}</span> — a function from <strong>${stateAncestor || parent || 'parent'}</strong>. Calling it triggers a state update and re-render.</div>`;
        });
      }

      html += `<span class="section-title">Data Flow</span>`;
      if (node.hasUseState) {
        html += `<div class="section-body">${name} is a <strong>data source</strong>. It owns the state and passes data down to its children via props.</div>`;
      } else if (setterProps.length > 0) {
        html += `<div class="section-body">${name} is a <strong>receiver</strong> that can also trigger changes. When ${setterProps.join(', ')} is called, <strong>${stateAncestor || parent}</strong> re-renders.</div>`;
      } else {
        html += `<div class="section-body">${name} is a <strong>read-only receiver</strong>. It only displays data passed from <strong>${parent || 'its parent'}</strong> and never changes anything.</div>`;
      }

      html += `<span class="section-title">Key Insight</span>`;
      let insight = '';
      if (node.hasUseState) {
        insight = '✦ Components with useState own their data. They are the "source of truth" for everything that depends on that state.';
      } else if (setterProps.length > 0) {
        insight = '✦ Receiving a setter function as a prop is how child components communicate back up to their parent. This pattern is called "lifting state up."';
      } else if (dataProps.length > 0 && children.length === 0) {
        insight = '✦ If a component only shows data and never changes anything, it needs no state — just props. This is the simplest kind of component.';
      } else if (children.length > 0) {
        insight = '✦ This component acts as a middle layer — it receives data from above and passes it down to its children.';
      } else {
        insight = '✦ A stateless component with no props is completely independent. It always renders the same output.';
      }
      html += `<div class="insight-box">${insight}</div>`;

      return html;
    }

    function getSubtitle(node) {
      if (node.hasUseState) return null;
      if (node.props && node.props.length > 0) {
        if (node.children && node.children.length > 0) return 'receives props, renders children';
        const hasSetters = node.props.some(p => p.startsWith('set') || p.startsWith('on'));
        if (hasSetters) return 'calls ' + node.props.filter(p => p.startsWith('on') || p.startsWith('set')).join(', ') + ' on click';
        return 'shows ' + node.props.join(', ');
      }
      return 'stateless';
    }

    function buildLayout(data) {
      const levels = {};
      const queue = [data.rootName];
      const visited = new Set([data.rootName]);
      levels[data.rootName] = 0;
      while (queue.length) {
        const cur = queue.shift();
        const node = data.components[cur];
        if (!node) continue;
        (node.children || []).forEach(child => {
          if (!visited.has(child)) {
            visited.add(child);
            levels[child] = (levels[cur] || 0) + 1;
            queue.push(child);
          }
        });
      }
      const byLevel = {};
      Object.entries(levels).forEach(([name, lv]) => {
        byLevel[lv] = byLevel[lv] || [];
        byLevel[lv].push(name);
      });
      const positions = {};
      const svgW = document.getElementById('graph-panel').offsetWidth;
      Object.entries(byLevel).forEach(([lv, names]) => {
        const y = parseInt(lv) * (NODE_H + V_GAP) + 80;
        const totalW = names.length * NODE_W + (names.length - 1) * H_GAP;
        const startX = (svgW - totalW) / 2;
        names.forEach((name, i) => {
          positions[name] = { x: startX + i * (NODE_W + H_GAP), y };
        });
      });
      return positions;
    }

    function onNodeClick(name) {
      const node = currentData.components[name];
      if (!node) return;

      d3.selectAll('.node').classed('selected', false);
      d3.select(`#node-${name}`).classed('selected', true);

      const panel = document.getElementById('ai-panel');
      if (panel.style.display === 'none') togglePanel();

      document.getElementById('ai-placeholder').style.display = 'none';
      document.getElementById('ai-content').style.display = 'block';
      document.getElementById('ai-component-name').textContent = name;

      const tag = document.getElementById('ai-component-tag');
      if (node.hasUseState) {
        tag.textContent = '③ Has useState';
        tag.className = 'has-state';
      } else if (node.props && node.props.length > 0) {
        tag.textContent = '② Receives props';
        tag.className = 'no-state';
      } else {
        tag.textContent = '① Leaf component';
        tag.className = 'no-state';
      }

      document.getElementById('ai-explanation').innerHTML = generateExplanation(name, node, currentData);

      if (window.javaConnector) window.javaConnector.onNodeClicked(name);
    }

    function render(data) {
      currentData = data;
      const svg = d3.select('#svg');
      const g = d3.select('#root-g');
      g.selectAll('*').remove();
      const pos = buildLayout(data);
      svg.call(zoomBehavior);

      Object.entries(data.components).forEach(([parentName, node]) => {
        (node.children || []).forEach(childName => {
          const p = pos[parentName], c = pos[childName];
          if (!p || !c) return;
          const x1 = p.x + NODE_W/2, y1 = p.y + NODE_H;
          const x2 = c.x + NODE_W/2, y2 = c.y;
          const my = (y1 + y2) / 2;
          g.append('path').attr('class', 'link-props')
            .attr('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
          const childNode = data.components[childName];
          const propsLabel = (childNode && childNode.props || []).join(', ');
          if (propsLabel) {
            g.append('text').attr('class', 'edge-label')
              .attr('x', (x1+x2)/2).attr('y', my - 5)
              .attr('text-anchor', 'middle')
              .text('props: ' + propsLabel);
          }
        });
      });

      const drawnStateEdges = new Set();
      Object.entries(data.components).forEach(([childName, node]) => {
        const hasSetterProps = (node.props || []).some(p => p.startsWith('set') || p.startsWith('on'));
        if (!hasSetterProps) return;
        const ancestor = findStateAncestor(childName, data);
        if (!ancestor) return;
        const edgeKey = `${childName}->${ancestor}`;
        if (drawnStateEdges.has(edgeKey)) return;
        drawnStateEdges.add(edgeKey);
        const c = pos[childName], p = pos[ancestor];
        if (!c || !p) return;
        const svgW = document.getElementById('graph-panel').offsetWidth;
        const goRight = c.x + NODE_W/2 >= svgW / 2;
        const offset = Math.max(160, svgW * 0.15);
        const x1 = goRight ? c.x + NODE_W : c.x;
        const y1 = c.y + NODE_H/2;
        const x2 = goRight ? p.x + NODE_W : p.x;
        const y2 = p.y + NODE_H/2;
        const sign = goRight ? 1 : -1;
        g.append('path').attr('class', 'link-state')
          .attr('d', `M${x1},${y1} C${x1+sign*offset},${y1} ${x2+sign*offset},${y2} ${x2},${y2}`);
        const mx = (x1 + sign * offset + x2 + sign * offset) / 2;
        const my = (y1 + y2) / 2;
        g.append('text').attr('class', 'edge-label-state')
          .attr('x', mx).attr('y', my - 3).attr('text-anchor', 'middle').text('setState');
        g.append('text').attr('class', 'edge-label-state')
          .attr('x', mx).attr('y', my + 11).attr('text-anchor', 'middle').text('re-render');
      });

      Object.entries(data.components).forEach(([name, node]) => {
        const p = pos[name];
        if (!p) return;
        const sub = getSubtitle(node);
        const grp = g.append('g').attr('class', 'node')
          .attr('id', `node-${name}`)
          .attr('transform', `translate(${p.x},${p.y})`)
          .on('click', () => onNodeClick(name));
        grp.append('rect').attr('width', NODE_W).attr('height', NODE_H).attr('rx', 12).attr('ry', 12);
        const nameY = node.hasUseState ? 28 : (sub ? 28 : 42);
        grp.append('text').attr('class', 'node-name')
          .attr('x', NODE_W/2).attr('y', nameY)
          .attr('text-anchor', 'middle').text(name);
        if (node.hasUseState) {
          grp.append('text').attr('class', 'node-usestate')
            .attr('x', NODE_W/2).attr('y', 50)
            .attr('text-anchor', 'middle').text('useState');
        } else if (sub) {
          grp.append('text').attr('class', 'node-sub')
            .attr('x', NODE_W/2).attr('y', 50)
            .attr('text-anchor', 'middle').text(sub);
        }
      });
    }

    function initGraph(jsonStr) {
      try { render(JSON.parse(jsonStr)); }
      catch(e) { document.body.innerHTML = '<p style="color:red;padding:20px">Error: ' + e.message + '</p>'; }
    }

    window.addEventListener('load', () => {
      initGraph(JSON.stringify({
        rootName: 'App',
        components: {
          App:     { hasUseState: true,  props: [],               children: ['Counter'] },
          Counter: { hasUseState: false, props: ['count','onAdd'], children: ['Display','Button'] },
          Display: { hasUseState: false, props: ['count'],         children: [] },
          Button:  { hasUseState: false, props: ['onAdd'],         children: [] }
        }
      }));
    });
</script>
</body>
</html>
