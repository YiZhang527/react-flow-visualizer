<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0ede8; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        svg { width: 100vw; height: 100vh; }

        .link-props { stroke: #4a9eff; stroke-width: 1.5; fill: none; marker-end: url(#arrow-props); }
        .link-state { stroke: #c87c2a; stroke-width: 1.5; fill: none; stroke-dasharray: 7,5; marker-end: url(#arrow-state); }

        .node rect { fill: white; stroke: #4a9eff; stroke-width: 2; cursor: pointer; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08)); }
        .node rect:hover { filter: drop-shadow(0 4px 16px rgba(74,158,255,0.2)); }
        .node-name { fill: #1a1a1a; font-size: 16px; font-weight: 700; pointer-events: none; }
        .node-sub { fill: #888; font-size: 11px; pointer-events: none; }
        .node-usestate { fill: #c87c2a; font-size: 13px; font-weight: 600; pointer-events: none; }

        .edge-label-bg { fill: #f0ede8; pointer-events: none; }
        .edge-label { fill: #4a9eff; font-size: 11px; pointer-events: none; font-weight: 500; }
        .edge-state-bg { fill: #f0ede8; pointer-events: none; }
        .edge-label-state { fill: #c87c2a; font-size: 11px; pointer-events: none; font-weight: 500; }

        #legend { position: fixed; bottom: 16px; left: 16px; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px 16px; color: #555; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .legend-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .legend-line { width: 32px; height: 2px; }
        .legend-line.props { background: #4a9eff; }
        .legend-line.state { border-top: 2px dashed #c87c2a; height: 0; }

        #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 13px; }
        #zoom-controls { position: fixed; top: 16px; left: 16px; display: flex; gap: 8px; z-index: 100; }
        #zoom-controls button { width: 32px; height: 32px; font-size: 18px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        #zoom-controls button:hover { background: #f0f0f0; }
    </style>
</head>
<body>
<div id="hint">Click any component to learn</div>
<div id="zoom-controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
</div>
<svg id="svg">
    <defs>
        <marker id="arrow-props" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
        </marker>
        <marker id="arrow-state" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#c87c2a"/>
        </marker>
    </defs>
    <g id="root-g"></g>
</svg>
<div id="legend">
    <div class="legend-row"><div class="legend-line props"></div> Props flow</div>
    <div class="legend-row"><div class="legend-line state"></div> State update</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
    const NODE_W = 220, NODE_H = 80, H_GAP = 80, V_GAP = 130;

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.3, 2])
      .filter(event => event.type === 'mousedown')
      .on('zoom', e => d3.select('#root-g').attr('transform', e.transform));

    function zoomIn() { d3.select('#svg').call(zoomBehavior.scaleBy, 1.3); }
    function zoomOut() { d3.select('#svg').call(zoomBehavior.scaleBy, 0.7); }

    function getSubtitle(node) {
      if (node.hasUseState) return null;
      if (node.props && node.props.length > 0) {
        const hasSetters = node.props.some(p => p.startsWith('set') || p.startsWith('on'));
        if (node.children && node.children.length > 0) return 'receives props, renders children';
        if (hasSetters) return 'calls ' + node.props.filter(p => p.startsWith('on') || p.startsWith('set')).join(', ') + ' on click';
        return 'shows ' + node.props.join(', ');
      }
      return 'stateless';
    }

    function buildLayout(data) {
      const levels = {};
      const queue = [data.rootName];
      const visited = new Set([data.rootName]);
      levels[data.rootName] = 0;
      while (queue.length) {
        const cur = queue.shift();
        const node = data.components[cur];
        if (!node) continue;
        (node.children || []).forEach(child => {
          if (!visited.has(child)) {
            visited.add(child);
            levels[child] = (levels[cur] || 0) + 1;
            queue.push(child);
          }
        });
      }
      const byLevel = {};
      Object.entries(levels).forEach(([name, lv]) => {
        byLevel[lv] = byLevel[lv] || [];
        byLevel[lv].push(name);
      });
      const positions = {};
      Object.entries(byLevel).forEach(([lv, names]) => {
        const y = parseInt(lv) * (NODE_H + V_GAP) + 80;
        const totalW = names.length * NODE_W + (names.length - 1) * H_GAP;
        const startX = (window.innerWidth - totalW) / 2;
        names.forEach((name, i) => {
          positions[name] = { x: startX + i * (NODE_W + H_GAP), y };
        });
      });
      return positions;
    }

    function findStateAncestor(childName, data) {
      for (const [parentName, node] of Object.entries(data.components)) {
        if (node.hasUseState && (node.children || []).includes(childName)) return parentName;
      }
      for (const [parentName, node] of Object.entries(data.components)) {
        if ((node.children || []).includes(childName)) {
          const ancestor = findStateAncestor(parentName, data);
          if (ancestor) return ancestor;
        }
      }
      return null;
    }

    function render(data) {
      const svg = d3.select('#svg');
      const g = d3.select('#root-g');
      g.selectAll('*').remove();
      const pos = buildLayout(data);
      svg.call(zoomBehavior);

      // Props edges
      Object.entries(data.components).forEach(([parentName, node]) => {
        (node.children || []).forEach(childName => {
          const p = pos[parentName], c = pos[childName];
          if (!p || !c) return;
          const x1 = p.x + NODE_W/2, y1 = p.y + NODE_H;
          const x2 = c.x + NODE_W/2, y2 = c.y;
          const my = (y1 + y2) / 2;
          g.append('path').attr('class', 'link-props')
            .attr('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);

          const childNode = data.components[childName];
          const propsLabel = (childNode && childNode.props || []).join(', ');
          if (propsLabel) {
            const lx = (x1+x2)/2, ly = my - 5;
            const tw = propsLabel.length * 6 + 20;
            g.append('text').attr('class', 'edge-label')
              .attr('x', lx).attr('y', ly)
              .attr('text-anchor', 'middle')
              .text('props: ' + propsLabel);
          }
        });
      });

      // State edges
      const drawnStateEdges = new Set();
      Object.entries(data.components).forEach(([childName, node]) => {
        const hasSetterProps = (node.props || []).some(p => p.startsWith('set') || p.startsWith('on'));
        if (!hasSetterProps) return;
        const ancestor = findStateAncestor(childName, data);
        if (!ancestor) return;
        const edgeKey = `${childName}->${ancestor}`;
        if (drawnStateEdges.has(edgeKey)) return;
        drawnStateEdges.add(edgeKey);
        const c = pos[childName], p = pos[ancestor];
        if (!c || !p) return;

        const goRight = c.x + NODE_W/2 >= window.innerWidth / 2;
        const offset = Math.max(160, window.innerWidth * 0.15);
        const x1 = goRight ? c.x + NODE_W : c.x;
        const y1 = c.y + NODE_H/2;
        const x2 = goRight ? p.x + NODE_W : p.x;
        const y2 = p.y + NODE_H/2;
        const sign = goRight ? 1 : -1;

        g.append('path').attr('class', 'link-state')
          .attr('d', `M${x1},${y1} C${x1+sign*offset},${y1} ${x2+sign*offset},${y2} ${x2},${y2}`);

        const mx = (x1 + sign * offset + x2 + sign * offset) / 2;
        const my = (y1 + y2) / 2;
        g.append('text').attr('class', 'edge-label-state')
          .attr('x', mx).attr('y', my - 3).attr('text-anchor', 'middle').text('setState');
        g.append('text').attr('class', 'edge-label-state')
          .attr('x', mx).attr('y', my + 11).attr('text-anchor', 'middle').text('re-render');
      });

      // Nodes
      Object.entries(data.components).forEach(([name, node]) => {
        const p = pos[name];
        if (!p) return;
        const sub = getSubtitle(node);
        const grp = g.append('g').attr('class', 'node')
          .attr('transform', `translate(${p.x},${p.y})`)
          .on('click', () => { if (window.javaConnector) window.javaConnector.onNodeClicked(name); });
        grp.append('rect').attr('width', NODE_W).attr('height', NODE_H).attr('rx', 12).attr('ry', 12);

        const nameY = node.hasUseState ? 28 : (sub ? 28 : 42);
        grp.append('text').attr('class', 'node-name')
          .attr('x', NODE_W/2).attr('y', nameY)
          .attr('text-anchor', 'middle').text(name);

        if (node.hasUseState) {
          grp.append('text').attr('class', 'node-usestate')
            .attr('x', NODE_W/2).attr('y', 50)
            .attr('text-anchor', 'middle').text('useState');
        } else if (sub) {
          grp.append('text').attr('class', 'node-sub')
            .attr('x', NODE_W/2).attr('y', 50)
            .attr('text-anchor', 'middle').text(sub);
        }
      });
    }

    function initGraph(jsonStr) {
      try { render(JSON.parse(jsonStr)); }
      catch(e) { document.body.innerHTML = '<p style="color:red;padding:20px">Error: ' + e.message + '</p>'; }
    }

    window.addEventListener('load', () => {
      initGraph(JSON.stringify({
        rootName: 'App',
        components: {
          App:     { hasUseState: true,  props: [],               children: ['Counter'] },
          Counter: { hasUseState: false, props: ['count','onAdd'], children: ['Display','Button'] },
          Display: { hasUseState: false, props: ['count'],         children: [] },
          Button:  { hasUseState: false, props: ['onAdd'],         children: [] }
        }
      }));
    });
</script>
</body>
</html>
